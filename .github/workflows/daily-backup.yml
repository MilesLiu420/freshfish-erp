name: 每日自動備份 Firebase 資料

on:
  schedule:
    - cron: '0 16 * * *'  # 每天台灣時間 00:00（UTC+8）
  workflow_dispatch:        # 也可手動觸發

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 Firebase Admin SDK
        run: npm install firebase-admin

      - name: 執行備份腳本（存到 Firebase Storage）
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/backup.js
